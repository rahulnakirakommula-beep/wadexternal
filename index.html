<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Registration and Login Validation</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>

    body{
      background:#f5f5f5;
    }

    .container-box{
      max-width:500px;
      margin:auto;
      margin-top:50px;
    }

    .card{
      margin-bottom:30px;
    }

    .title{
      text-align:center;
      margin-bottom:20px;
      font-weight:bold;
    }

  </style>

</head>

<body>

<div class="container container-box">

 
  <div class="card shadow p-4">

    <h2 class="title">
     Registration Form
    </h2>

    <form id="registerForm">

      <!-- NAME -->
      <div class="mb-3">

        <label class="form-label">
          Name
        </label>

        <input
          type="text"
          class="form-control"
          id="regName"
          placeholder="Enter your name"
        >

      </div>


      <!-- EMAIL -->
      <div class="mb-3">

        <label class="form-label">
          Email
        </label>

        <input
          type="email"
          class="form-control"
          id="regEmail"
          placeholder="Enter your email"
        >

      </div>


      <!-- PASSWORD -->
      <div class="mb-3">

        <label class="form-label">
          Password
        </label>

        <input
          type="password"
          class="form-control"
          id="regPassword"
          placeholder="Enter password"
        >

      </div>


      <!-- BUTTON -->
      <button
        type="submit"
        class="btn btn-primary w-100"
      >
        Register
      </button>

    </form>

  </div>



  <!-- LOGIN FORM -->
  <div class="card shadow p-4">

    <h2 class="title">
      Login Form
    </h2>

    <form id="loginForm">

      <!-- EMAIL -->
      <div class="mb-3">

        <label class="form-label">
          Email
        </label>

        <input
          type="email"
          class="form-control"
          id="loginEmail"
          placeholder="Enter your email"
        >

      </div>


      <!-- PASSWORD -->
      <div class="mb-3">

        <label class="form-label">
          Password
        </label>

        <input
          type="password"
          class="form-control"
          id="loginPassword"
          placeholder="Enter password"
        >

      </div>


      <!-- BUTTON -->
      <button
        type="submit"
        class="btn btn-success w-100"
      >
        Login
      </button>

    </form>

  </div>

</div>


<!-- Bootstrap JS -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>

<!-- External JavaScript -->
<script src="script.js"></script>

</body>
</html>
